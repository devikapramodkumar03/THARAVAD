<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tharavad AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest: #133215;
            --sage: #92B775;
            --cream: #F3E8D3;
            --sage-light: #a8c98e;
            --forest-dark: #0a1f0c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: var(--cream);
            color: var(--forest);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Container */
        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 100vh;
            position: relative;
        }

        /* Left Side - Visual/Branding */
        .login-visual {
            background: var(--forest);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
        }

        .login-visual::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 70%;
            height: 140%;
            background: radial-gradient(circle, var(--sage) 0%, transparent 70%);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        .visual-content {
            position: relative;
            z-index: 1;
        }

        .logo-section {
            margin-bottom: 4rem;
        }

        .logo-section a {
            text-decoration: none;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--cream);
            letter-spacing: -0.5px;
            margin-bottom: 0.5rem;
            display: inline-block;
            transition: color 0.3s ease;
        }

        .logo:hover {
            color: var(--sage);
        }

        .tagline {
            font-size: 1.1rem;
            color: var(--cream);
            opacity: 0.8;
        }

        .welcome-content {
            animation: fadeInLeft 1s ease-out;
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .welcome-content h1 {
            font-family: 'Syne', sans-serif;
            font-size: 3.5rem;
            line-height: 1.2;
            color: var(--cream);
            margin-bottom: 1.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .welcome-content p {
            font-size: 1.3rem;
            line-height: 1.7;
            color: var(--cream);
            opacity: 0.85;
            margin-bottom: 2.5rem;
        }

        .visual-image-container {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            height: 450px;
            margin-top: 3rem;
        }

        .visual-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%) contrast(1.1);
            opacity: 0.7;
        }

        /* Right Side - Form */
        .login-form-section {
            background: var(--cream);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem;
            position: relative;
        }

        .form-container {
            width: 100%;
            max-width: 480px;
            animation: fadeInRight 1s ease-out;
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .form-header {
            margin-bottom: 3rem;
        }

        .form-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 2.8rem;
            color: var(--forest);
            margin-bottom: 0.8rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .form-header p {
            font-size: 1.15rem;
            color: var(--forest);
            opacity: 0.75;
        }

        .login-form {
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            display: block;
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            color: var(--forest);
            margin-bottom: 0.6rem;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 1.1rem 1.3rem;
            border: 2px solid rgba(19, 50, 21, 0.15);
            border-radius: 12px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            background: white;
            color: var(--forest);
        }

        .form-group input::placeholder {
            color: var(--forest);
            opacity: 0.4;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--sage);
            box-shadow: 0 0 0 3px rgba(146, 183, 117, 0.1);
        }

        .password-toggle {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--forest);
            opacity: 0.5;
            cursor: pointer;
            font-size: 1.2rem;
            transition: opacity 0.3s ease;
        }

        .toggle-password:hover {
            opacity: 0.8;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--sage);
        }

        .remember-me label {
            font-size: 1rem;
            color: var(--forest);
            cursor: pointer;
        }

        .forgot-password {
            color: var(--sage);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--forest);
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--forest);
            color: var(--cream);
            border: none;
            border-radius: 50px;
            font-family: 'Syne', sans-serif;
            font-size: 1.15rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 2rem;
        }

        .submit-btn:hover {
            background: var(--forest-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(19, 50, 21, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 2rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(19, 50, 21, 0.15);
        }

        .divider span {
            padding: 0 1rem;
            color: var(--forest);
            opacity: 0.5;
            font-size: 0.95rem;
        }

        .social-login {
            display: grid;
            gap: 1rem;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            padding: 1rem;
            background: white;
            border: 2px solid rgba(19, 50, 21, 0.15);
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--forest);
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-btn:hover {
            border-color: var(--sage);
            background: rgba(146, 183, 117, 0.05);
        }

        .social-icon {
            font-size: 1.3rem;
        }

        .signup-prompt {
            text-align: center;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(19, 50, 21, 0.1);
        }

        .signup-prompt p {
            color: var(--forest);
            opacity: 0.75;
            font-size: 1.05rem;
        }

        .signup-link {
            color: var(--sage);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .signup-link:hover {
            color: var(--forest);
            text-decoration: underline;
        }

        .security-note {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(146, 183, 117, 0.08);
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--forest);
            opacity: 0.7;
        }

        .security-icon {
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .login-container {
                grid-template-columns: 1fr;
            }

            .login-visual {
                display: none;
            }

            .login-form-section {
                padding: 3rem 2rem;
            }

            .form-container {
                max-width: 500px;
            }
        }

        @media (max-width: 640px) {
            .login-form-section {
                padding: 2rem 1.5rem;
            }

            .form-header h2 {
                font-size: 2.2rem;
            }

            .welcome-content h1 {
                font-size: 2.5rem;
            }

            .form-options {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }
        }

        /* Loading Animation */
        .submit-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .submit-btn.loading::after {
            content: '';
            width: 16px;
            height: 16px;
            margin-left: 10px;
            border: 2px solid var(--cream);
            border-radius: 50%;
            border-top-color: transparent;
            display: inline-block;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Left Side - Visual/Branding -->
        <div class="login-visual">
            <div class="visual-content">
                <div class="logo-section">
                    <a href="home.html">
                        <div class="logo">Tharavad AI</div>
                    </a>
                </div>

                <div class="welcome-content">
                    <h1>Welcome Back</h1>
                </div>

                <div class="visual-image-container">
                    <img src="https://images.unsplash.com/photo-1556912167-f556f1f39fdf?w=800&q=80" alt="Smart home technology">
                </div>
            </div>
        </div>

        <!-- Right Side - Login Form -->
        <div class="login-form-section">
            <div class="form-container">
                <div class="form-header">
                    <h2>Sign In</h2>
                    <p>Enter your credentials to access your account</p>
                </div>

                <form class="login-form" id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com" 
                            required
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-toggle">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Enter your password" 
                                required
                                autocomplete="current-password"
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>

                    <button type="submit" class="submit-btn">Sign In</button>
                </form>

                <div class="divider">
                    <span>Or continue with</span>
                </div>

                <div class="social-login">
                    <button class="social-btn" onclick="socialLogin('google')">
                        <span>Continue with Google</span>
                    </button>
                    <button class="social-btn" onclick="socialLogin('apple')">
                        <span>Continue with Apple</span>
                    </button>
                </div>

                <div class="signup-prompt">
                    <p>Don't have an account? <a href="signup.html" class="signup-link">Sign up now</a></p>
                </div>

            </div>
        </div>
    </div>

    <script>
        // Toggle password visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '👁️‍🗨️';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        // Form submission handler
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('.submit-btn');
            
            // Check credentials
            if (email === 'gopikadevika@gmail.com' && password === 'pramodk1') {
                submitBtn.classList.add('loading');
                submitBtn.textContent = 'Signing in';
                
                // Simulate API call and redirect
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                alert('Invalid credentials! Please use:\nEmail: gopikadevika@gmail.com\nPassword: pramodk1');
            }
        });

        // Social login handlers
        function socialLogin(provider) {
            console.log(`Logging in with ${provider}`);
            // Implement social login logic here
            alert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login coming soon!`);
        }

        // Add enter key support
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
